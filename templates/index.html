<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seznam impaktních kráterů v Evropě</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <h1>Seznam impaktních kráterů v Evropě</h1>
        
        <div id="map" style="height: 500px; margin-bottom: 30px; border-radius: 8px;"></div>

        <div class="filters">
            <input type="text" id="search" onkeyup="filterCraters()" placeholder="Hledat kráter..." />
            <input type="text" id="searchCountry" onkeyup="filterCraters()" placeholder="Hledat dle místa..." />
            
            <div class="numeric-filters">
                <div>
                    <h3>Průměr (km)</h3>
                    <input type="number" id="minDiameter" onkeyup="filterCraters()" placeholder="Min">
                    <input type="number" id="maxDiameter" onkeyup="filterCraters()" placeholder="Max">
                </div>
                <div>
                    <h3>Stáří (Ma)</h3>
                    <input type="number" id="minAge" onkeyup="filterCraters()" placeholder="Min">
                    <input type="number" id="maxAge" onkeyup="filterCraters()" placeholder="Max">
                </div>
            </div>
        </div>

        <ul class="crater-list" id="craterList">
            {% for crater in craters %}
            <li class="crater-item" data-name="{{ crater.crater_name|lower }}" data-loc="{{ crater.location|lower }}">
                <strong>{{ crater.crater_name }}</strong> ({{ crater.location }})<br>
                Průměr: {{ crater.diameter_km }} km | Stáří: {{ crater.age_million_years }} Ma
            </li>
            {% endfor %}
        </ul>
    </div>

    <script>
        var map = L.map('map').setView([50.0, 15.0], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Pole pro ukládání značek pro potřeby filtrů
        var craterData = [];

        {% for crater in craters %}
        {% if crater.latitude and crater.longitude %}
        (function() {
            var marker = L.marker([{{ crater.latitude }}, {{ crater.longitude }}])
                .bindPopup("<b>{{ crater.crater_name }}</b><br>Průměr: {{ crater.diameter_km }} km")
                .addTo(map);

            craterData.push({
                marker: marker,
                name: "{{ crater.crater_name|lower }}",
                location: "{{ crater.location|lower }}",
                diameter: {{ crater.diameter_km or 0 }},
                age: {{ crater.age_million_years or 0 }},
                element: document.querySelectorAll('.crater-item')[{{ loop.index0 }}]
            });
        })();
        {% endif %}
        {% endfor %}

        function filterCraters() {
            var sName = document.getElementById('search').value.toLowerCase();
            var sLoc = document.getElementById('searchCountry').value.toLowerCase();
            var minD = parseFloat(document.getElementById('minDiameter').value) || 0;
            var maxD = parseFloat(document.getElementById('maxDiameter').value) || 999999;
            var minA = parseFloat(document.getElementById('minAge').value) || 0;
            var maxA = parseFloat(document.getElementById('maxAge').value) || 999999;

            craterData.forEach(function(item) {
                var match = item.name.includes(sName) &&
                            item.location.includes(sLoc) &&
                            item.diameter >= minD && item.diameter <= maxD &&
                            item.age >= minA && item.age <= maxA;

                if (match) {
                    item.marker.addTo(map);
                    item.element.style.display = "";
                } else {
                    map.removeLayer(item.marker);
                    item.element.style.display = "none";
                }
            });
        }
    </script>
</body>
</html>
